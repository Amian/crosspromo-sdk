name: crosspromo_sdk
description: Privacy-first native recommendation cards for the CrossPromo network.
version: 0.3.4
repository: https://github.com/Amian/crosspromo-sdk

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: app.crosspromo.sdk
        pluginClass: CrossPromoFlutterPlugin
      ios:
        pluginClass: CrossPromoFlutterPlugin
