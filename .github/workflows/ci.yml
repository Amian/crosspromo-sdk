name: SDK CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  native-ios:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: plutil -lint packages/crosspromo-ios/Sources/CrossPromo/PrivacyInfo.xcprivacy packages/crosspromo-flutter/ios/PrivacyInfo.xcprivacy packages/crosspromo-react-native/ios/PrivacyInfo.xcprivacy
      - run: swift test

  flutter-ios:
    runs-on: macos-15
    timeout-minutes: 20
    defaults:
      run:
        working-directory: packages/crosspromo-flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test

  react-native-ios:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/crosspromo-react-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/crosspromo-react-native/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run
